<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Game Con Rắn khó Nhất hành tinh</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: #0a1f12;
            border-radius: 48px;
            padding: 20px 25px 25px 25px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            background-color: #1e3a2f;
            cursor: pointer;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            margin-bottom: 12px;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .score-box, .best-box, .timer-box, .enemy-timer-box {
            background: #000000aa;
            backdrop-filter: blur(4px);
            padding: 8px 15px;
            border-radius: 60px;
            font-weight: bold;
            box-shadow: inset 0 1px 2px #ffffff30, 0 5px 8px #00000030;
        }

        .score-box span, .best-box span, .timer-box span, .enemy-timer-box span {
            color: #c7f0b8;
            font-size: 0.9rem;
            margin-right: 8px;
        }

        .score-value, .best-value, .timer-value, .enemy-timer-value {
            color: #f9e45b;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 2px 0 #5a3e00;
        }

        .timer-value, .enemy-timer-value {
            color: #ff9966;
        }

        .warning {
            color: #ff4444;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            background: #2c3e2b;
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 60px;
            color: #f2e8cf;
            font-family: monospace;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 5px 0 #0f2b0a;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0f2b0a;
        }

        .restart-btn {
            background: #b1624b;
            color: white;
        }

        .mode-btn {
            background: #2c5a2c;
        }

        .mode-active {
            background: #f9b81b;
            color: #2c2c2c;
            box-shadow: 0 5px 0 #b87c10;
        }

        .status {
            text-align: center;
            margin-top: 12px;
            font-size: 0.9rem;
            font-weight: bold;
            background: #00000080;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
            color: #e9f5db;
        }

        .mobile-arrows {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 18px;
        }

        .arrow-btn {
            background: #2c3e2bdd;
            font-size: 1.8rem;
            padding: 8px 20px;
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 5px); }
            75% { transform: translate(5px, -5px); }
        }

        .shake {
            animation: shake 0.2s ease-in-out 0s 2;
        }

        @media (max-width: 600px) {
            .score-value, .best-value, .timer-value, .enemy-timer-value {
                font-size: 1.2rem;
            }
            button {
                padding: 6px 14px;
                font-size: 1rem;
            }
            .arrow-btn {
                padding: 6px 14px;
                font-size: 1.3rem;
            }
        }

        footer {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 16px;
            color: #b9d8b3;
        }
        
        .mode-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 8px;
        }
        
        .mode-indicator {
            text-align: center;
            margin-top: 8px;
            font-size: 0.8rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="900" height="900"></canvas>

        <div class="info-panel">
            <div class="score-box">🍎 ĐIỂM <span class="score-value" id="scoreDisplay">0</span></div>
            <div class="timer-box">💣 BOM TIẾP <span class="timer-value" id="timerDisplay">10</span>s</div>
            <div class="enemy-timer-box" id="enemyTimerBox">🐍 RẮN ĐUỔI <span class="enemy-timer-value" id="enemyTimerDisplay">30</span>s</div>
            <div class="best-box">🏆 CAO NHẤT <span class="best-value" id="bestDisplay">0</span></div>
        </div>

        <div style="display: flex; justify-content: center; flex-direction: column; align-items: center;">
            <div class="status" id="statusText">🐍 CHỌN CHẾ ĐỘ BÊN DƯỚI</div>
            <div class="mode-indicator" id="modeIndicator">⚡ CHẾ ĐỘ: <span id="currentModeLabel">DỄ (XUYÊN TƯỜNG)</span> ⚡</div>
        </div>

        <div class="mode-buttons">
            <button id="easyModeBtn" class="mode-btn mode-active">🍃 Người Bình Thường</button>
            <button id="hardModeBtn" class="mode-btn">🔥 Châu Á</button>
        </div>

        <div class="controls">
            <button id="restartButton" class="restart-btn">⟳ CHƠI LẠI</button>
        </div>

        </div>
        <footer>Hãy sống sót tốt nhé</footer>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const bestSpan = document.getElementById('bestDisplay');
        const timerSpan = document.getElementById('timerDisplay');
        const enemyTimerSpan = document.getElementById('enemyTimerDisplay');
        const enemyTimerBox = document.getElementById('enemyTimerBox');
        const statusDiv = document.getElementById('statusText');
        const currentModeLabel = document.getElementById('currentModeLabel');
        const easyModeBtn = document.getElementById('easyModeBtn');
        const hardModeBtn = document.getElementById('hardModeBtn');

        const GRID_SIZE = 20;
        const CELL_SIZE = canvas.width / GRID_SIZE;

        // Game variables
        let snake = [];
        let food = { x: 12, y: 10 };
        let bombs = [];
        let enemySnake = null;
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let bestScore = 0;
        let gameLoopId = null;
        let bombTimerId = null;
        let enemyTimerId = null;
        let enemyMoveIntervalId = null; // Timer riêng cho di chuyển rắn đuổi
        let isGameRunning = true;
        let gameSpeed = 120;
        
        let isEasyMode = true;
        
        let bombCountdown = 10;
        let enemyCountdown = 30;
        let enemyActive = false;
        
        // Hiệu ứng nổ
        let explosions = [];
        
        // Tốc độ rắn đuổi (giảm xuống 500ms = 0.5 giây di chuyển 1 lần)
        const ENEMY_MOVE_DELAY = 500; // 500ms = chậm hơn nhiều so với rắn chính (120ms)
        
        function loadBestScore() {
            const key = isEasyMode ? 'snakeBestScoreEasy' : 'snakeBestScoreHard';
            try {
                const saved = localStorage.getItem(key);
                bestScore = saved && !isNaN(parseInt(saved)) ? parseInt(saved) : 0;
                bestSpan.innerText = bestScore;
            } catch(e) {}
        }
        
        function saveBestScore() {
            const key = isEasyMode ? 'snakeBestScoreEasy' : 'snakeBestScoreHard';
            try { localStorage.setItem(key, bestScore); } catch(e) {}
        }
        
        function updateScoreUI() {
            scoreSpan.innerText = score;
            if(score > bestScore) {
                bestScore = score;
                bestSpan.innerText = bestScore;
                saveBestScore();
            }
        }
        
        function updateTimerUI() {
            timerSpan.innerText = bombCountdown;
            if(bombCountdown <= 3) {
                timerSpan.style.color = '#ff4444';
                timerSpan.classList.add('warning');
            } else {
                timerSpan.style.color = '#ff9966';
                timerSpan.classList.remove('warning');
            }
        }
        
        function updateEnemyTimerUI() {
            if(!isEasyMode) {
                enemyTimerSpan.innerText = enemyCountdown;
                if(enemyCountdown <= 5) {
                    enemyTimerSpan.style.color = '#ff4444';
                    enemyTimerSpan.classList.add('warning');
                } else {
                    enemyTimerSpan.style.color = '#ff9966';
                    enemyTimerSpan.classList.remove('warning');
                }
            }
        }

        function setStatus(message, isError = false) {
            statusDiv.innerHTML = message;
            statusDiv.style.color = isError ? "#ffb4a2" : "#e9f5db";
        }
        
        function shakeScreen() {
            const container = document.querySelector('.game-container');
            container.classList.add('shake');
            setTimeout(() => {
                container.classList.remove('shake');
            }, 400);
        }
        
        function addExplosion(x, y) {
            explosions.push({
                x: x,
                y: y,
                radius: 5,
                maxRadius: CELL_SIZE * 3,
                frame: 0,
                maxFrames: 12
            });
        }
        
        function updateExplosions() {
            for(let i = explosions.length - 1; i >= 0; i--) {
                const exp = explosions[i];
                exp.frame++;
                exp.radius = exp.maxRadius * (exp.frame / exp.maxFrames);
                if(exp.frame >= exp.maxFrames) {
                    explosions.splice(i, 1);
                }
            }
        }
        
        function drawExplosions() {
            for(const exp of explosions) {
                const x = exp.x * CELL_SIZE;
                const y = exp.y * CELL_SIZE;
                const radius = exp.radius;
                const alpha = 1 - (exp.frame / exp.maxFrames);
                
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(255, 100, 0, 0.8)';
                
                ctx.beginPath();
                ctx.arc(x + CELL_SIZE/2, y + CELL_SIZE/2, radius, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    x + CELL_SIZE/2, y + CELL_SIZE/2, radius * 0.3,
                    x + CELL_SIZE/2, y + CELL_SIZE/2, radius
                );
                gradient.addColorStop(0, `rgba(255, 200, 50, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(255, 100, 0, ${alpha * 0.8})`);
                gradient.addColorStop(1, `rgba(200, 50, 0, 0)`);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                for(let i = 0; i < 12; i++) {
                    const angle = (i * 30 + exp.frame * 15) * Math.PI / 180;
                    const dist = radius * 0.8;
                    const x1 = x + CELL_SIZE/2 + Math.cos(angle) * dist;
                    const y1 = y + CELL_SIZE/2 + Math.sin(angle) * dist;
                    ctx.beginPath();
                    ctx.moveTo(x + CELL_SIZE/2, y + CELL_SIZE/2);
                    ctx.lineTo(x1, y1);
                    ctx.strokeStyle = `rgba(255, 100, 0, ${alpha})`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
                
                ctx.restore();
            }
        }
        
        function explodeBomb(bomb) {
            const radius = 1;
            const affectedCells = [];
            
            addExplosion(bomb.x, bomb.y);
            shakeScreen();
            
            for(let dx = -radius; dx <= radius; dx++) {
                for(let dy = -radius; dy <= radius; dy++) {
                    let x = bomb.x + dx;
                    let y = bomb.y + dy;
                    if(x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                        affectedCells.push({x, y});
                        if(dx !== 0 || dy !== 0) {
                            setTimeout(() => addExplosion(x, y), 50);
                        }
                    }
                }
            }
            
            setStatus("💥 BOOOOM! NỔ RỒI! 💥", false);
            
            const head = snake[0];
            const isHeadExploded = affectedCells.some(cell => cell.x === head.x && cell.y === head.y);
            
            if(isHeadExploded) {
                setStatus("💥 TRÚNG BOM NỔ! GAME OVER! 💥", true);
                gameOver();
                return true;
            }
            
            if(enemyActive && enemySnake) {
                const isEnemyExploded = affectedCells.some(cell => cell.x === enemySnake.x && cell.y === enemySnake.y);
                if(isEnemyExploded) {
                    setStatus("💥 BOM NỔ TIÊU DIỆT RẮN ĐUỔI! 💥", false);
                    addExplosion(enemySnake.x, enemySnake.y);
                    enemyActive = false;
                    enemySnake = null;
                    if(enemyMoveIntervalId) {
                        clearInterval(enemyMoveIntervalId);
                        enemyMoveIntervalId = null;
                    }
                }
            }
            
            return false;
        }
        
        function spawnBomb() {
            if(!isGameRunning) return;
            
            const snakeSet = new Set(snake.map(seg => `${seg.x},${seg.y}`));
            const bombSet = new Set(bombs.map(b => `${b.x},${b.y}`));
            
            let freeCells = [];
            for(let i=0; i<GRID_SIZE; i++) {
                for(let j=0; j<GRID_SIZE; j++) {
                    if(!snakeSet.has(`${i},${j}`) && !bombSet.has(`${i},${j}`) && !(food.x === i && food.y === j)) {
                        if(!enemyActive || (enemySnake && !(enemySnake.x === i && enemySnake.y === j))) {
                            freeCells.push({x: i, y: j});
                        }
                    }
                }
            }
            
            if(freeCells.length > 0) {
                const randIndex = Math.floor(Math.random() * freeCells.length);
                bombs.push({ 
                    x: freeCells[randIndex].x, 
                    y: freeCells[randIndex].y,
                    spawnTime: Date.now()
                });
                setStatus(`💣 BOM XUẤT HIỆN! SẼ NỔ SAU 5 GIÂY!`, false);
            }
        }
        
        function checkBombExplosion() {
            const now = Date.now();
            const bombsToExplode = bombs.filter(bomb => (now - bomb.spawnTime) >= 5000);
            bombs = bombs.filter(bomb => (now - bomb.spawnTime) < 5000);
            
            for(let bomb of bombsToExplode) {
                const gameEnded = explodeBomb(bomb);
                if(gameEnded) return true;
            }
            return false;
        }
        
        // Di chuyển rắn đuổi CHẬM hơn
        function moveEnemySnake() {
            if(!enemyActive || !enemySnake || isEasyMode || !isGameRunning) return;
            
            const head = snake[0];
            let dx = head.x - enemySnake.x;
            let dy = head.y - enemySnake.y;
            
            let newX = enemySnake.x;
            let newY = enemySnake.y;
            
            // Di chuyển theo hướng ưu tiên (vẫn đuổi nhưng chậm)
            if(Math.abs(dx) > Math.abs(dy)) {
                if(dx > 0) newX++;
                else newX--;
            } else {
                if(dy > 0) newY++;
                else newY--;
            }
            
            newX = Math.max(0, Math.min(GRID_SIZE - 1, newX));
            newY = Math.max(0, Math.min(GRID_SIZE - 1, newY));
            
            enemySnake.x = newX;
            enemySnake.y = newY;
            
            // Kiểm tra va chạm sau khi di chuyển
            if(enemySnake.x === head.x && enemySnake.y === head.y) {
                setStatus("🐍 BỊ RẮN ĐUỔI TẤN CÔNG! GAME OVER! 🐍", true);
                gameOver();
            }
        }
        
        function startEnemyMovement() {
            if(enemyMoveIntervalId) clearInterval(enemyMoveIntervalId);
            if(isEasyMode) return;
            
            enemyMoveIntervalId = setInterval(() => {
                if(enemyActive && isGameRunning && !isEasyMode) {
                    moveEnemySnake();
                    drawGame();
                }
            }, ENEMY_MOVE_DELAY);
        }
        
        function spawnEnemySnake() {
            if(!isGameRunning || isEasyMode) return;
            
            const snakeSet = new Set(snake.map(seg => `${seg.x},${seg.y}`));
            const bombSet = new Set(bombs.map(b => `${b.x},${b.y}`));
            
            let freeCells = [];
            for(let i=0; i<GRID_SIZE; i++) {
                for(let j=0; j<GRID_SIZE; j++) {
                    if(!snakeSet.has(`${i},${j}`) && !bombSet.has(`${i},${j}`) && !(food.x === i && food.y === j)) {
                        freeCells.push({x: i, y: j});
                    }
                }
            }
            
            if(freeCells.length > 0) {
                const randIndex = Math.floor(Math.random() * freeCells.length);
                enemyActive = true;
                enemySnake = {
                    x: freeCells[randIndex].x,
                    y: freeCells[randIndex].y,
                    spawnTime: Date.now()
                };
                setStatus("🐍 CẢNH BÁO! RẮN ĐUỔI XUẤT HIỆN! (DI CHUYỂN CHẬM) 🐍", true);
                
                setTimeout(() => {
                    if(isGameRunning && enemyActive) {
                        addExplosion(enemySnake.x, enemySnake.y);
                    }
                }, 100);
                
                // Rắn đuổi biến mất sau 5s
                setTimeout(() => {
                    if(isGameRunning && !isEasyMode && enemyActive) {
                        enemyActive = false;
                        enemySnake = null;
                        setStatus("🐍 RẮN ĐUỔI ĐÃ BIẾN MẤT!", false);
                    }
                }, 5000);
            }
        }
        
        function checkEnemyCollision(head) {
            if(enemyActive && enemySnake && head.x === enemySnake.x && head.y === enemySnake.y) {
                setStatus("🐍 BỊ RẮN ĐUỔI TẤN CÔNG! GAME OVER! 🐍", true);
                return true;
            }
            return false;
        }
        
        function checkBombCollision(head) {
            return bombs.some(bomb => bomb.x === head.x && bomb.y === head.y);
        }
        
        function startBombCountdown() {
            if(bombTimerId) clearInterval(bombTimerId);
            bombCountdown = 10;
            updateTimerUI();
            
            bombTimerId = setInterval(() => {
                if(!isGameRunning) return;
                bombCountdown--;
                updateTimerUI();
                
                if(bombCountdown <= 0) {
                    spawnBomb();
                    bombCountdown = 10;
                    updateTimerUI();
                }
            }, 1000);
        }
        
        function startEnemyCountdown() {
            if(enemyTimerId) clearInterval(enemyTimerId);
            if(isEasyMode) return;
            
            enemyCountdown = 30;
            updateEnemyTimerUI();
            
            enemyTimerId = setInterval(() => {
                if(!isGameRunning || isEasyMode) return;
                
                enemyCountdown--;
                updateEnemyTimerUI();
                
                if(enemyCountdown <= 0) {
                    spawnEnemySnake();
                    enemyCountdown = 30;
                    updateEnemyTimerUI();
                }
            }, 1000);
        }
        
        function gameOver() {
            if(!isGameRunning) return;
            isGameRunning = false;
            if(gameLoopId) clearInterval(gameLoopId);
            if(bombTimerId) clearInterval(bombTimerId);
            if(enemyTimerId) clearInterval(enemyTimerId);
            if(enemyMoveIntervalId) clearInterval(enemyMoveIntervalId);
            setStatus("BẠN CHƠI GÀ QUÁ TRẺ CON CÒN GIỎI HƠN BẠN", true);
            shakeScreen();
        }
        
        function gameWin() {
            if(!isGameRunning) return;
            isGameRunning = false;
            if(gameLoopId) clearInterval(gameLoopId);
            if(bombTimerId) clearInterval(bombTimerId);
            if(enemyTimerId) clearInterval(enemyTimerId);
            if(enemyMoveIntervalId) clearInterval(enemyMoveIntervalId);
            setStatus("🏆 SIÊU NHÂN! BẠN ĐÃ CHIẾN THẮNG 🏆", false);
        }
        
        function generateRandomFood() {
            if(snake.length >= GRID_SIZE * GRID_SIZE) {
                gameWin();
                return false;
            }
            
            const snakeSet = new Set(snake.map(seg => `${seg.x},${seg.y}`));
            const bombSet = new Set(bombs.map(b => `${b.x},${b.y}`));
            
            let freeCells = [];
            for(let i=0; i<GRID_SIZE; i++) {
                for(let j=0; j<GRID_SIZE; j++) {
                    if(!snakeSet.has(`${i},${j}`) && !bombSet.has(`${i},${j}`)) {
                        if(!enemyActive || (enemySnake && !(enemySnake.x === i && enemySnake.y === j))) {
                            freeCells.push({x: i, y: j});
                        }
                    }
                }
            }
            if(freeCells.length === 0) {
                gameWin();
                return false;
            }
            food = freeCells[Math.floor(Math.random() * freeCells.length)];
            return true;
        }
        
        function handleWallTeleport(head) {
            let newHead = { ...head };
            if(newHead.x < 0) newHead.x = GRID_SIZE - 1;
            if(newHead.x >= GRID_SIZE) newHead.x = 0;
            if(newHead.y < 0) newHead.y = GRID_SIZE - 1;
            if(newHead.y >= GRID_SIZE) newHead.y = 0;
            return newHead;
        }
        
        function checkWallCollision(head) {
            return (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE);
        }
        
        function resetGame() {
            if(gameLoopId) clearInterval(gameLoopId);
            if(bombTimerId) clearInterval(bombTimerId);
            if(enemyTimerId) clearInterval(enemyTimerId);
            if(enemyMoveIntervalId) clearInterval(enemyMoveIntervalId);
            
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            isGameRunning = true;
            bombs = [];
            enemyActive = false;
            enemySnake = null;
            bombCountdown = 10;
            enemyCountdown = 30;
            explosions = [];
            
            updateScoreUI();
            updateTimerUI();
            
            const snakeSet = new Set(snake.map(s => `${s.x},${s.y}`));
            let freeSpots = [];
            for(let i=0; i<GRID_SIZE; i++) {
                for(let j=0; j<GRID_SIZE; j++) {
                    if(!snakeSet.has(`${i},${j}`)) freeSpots.push({x:i, y:j});
                }
            }
            food = freeSpots.length > 0 ? freeSpots[Math.floor(Math.random() * freeSpots.length)] : { x: 5, y: 5 };
            
            updateModeUI();
            drawGame();
            startBombCountdown();
            startEnemyCountdown();
            startEnemyMovement();
            gameLoopId = setInterval(gameTick, gameSpeed);
        }
        
        function gameTick() {
            if(!isGameRunning) return;
            
            updateExplosions();
            
            const bombExploded = checkBombExplosion();
            if(bombExploded) {
                drawGame();
                return;
            }
            
            direction = nextDirection;
            
            let newHead = { ...snake[0] };
            switch(direction) {
                case 'right': newHead.x += 1; break;
                case 'left': newHead.x -= 1; break;
                case 'up': newHead.y -= 1; break;
                case 'down': newHead.y += 1; break;
            }
            
            if(isEasyMode) {
                newHead = handleWallTeleport(newHead);
            } else {
                if(checkWallCollision(newHead)) {
                    gameOver();
                    drawGame();
                    return;
                }
            }
            
            if(checkBombCollision(newHead)) {
                setStatus("💣 ĐỤNG BOM CHƯA NỔ! GAME OVER! 💣", true);
                addExplosion(newHead.x, newHead.y);
                gameOver();
                drawGame();
                return;
            }
            
            if(checkEnemyCollision(newHead)) {
                gameOver();
                drawGame();
                return;
            }
            
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            
            snake.unshift(newHead);
            if(!willEat) {
                snake.pop();
            } else {
                score++;
                updateScoreUI();
                generateRandomFood();
            }
            
            const head = snake[0];
            const collidesWithSelf = snake.slice(1).some(segment => segment.x === head.x && segment.y === head.y);
            if(collidesWithSelf) {
                gameOver();
                drawGame();
                return;
            }
            
            drawGame();
            
            if(!isGameRunning && gameLoopId) {
                clearInterval(gameLoopId);
                gameLoopId = null;
            }
        }
        
        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if(!isEasyMode) {
                ctx.strokeStyle = '#ff6b6b';
                ctx.lineWidth = 3;
                ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
            } else {
                ctx.strokeStyle = '#6fbf4c';
                ctx.lineWidth = 2;
                ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
            }
            
            ctx.strokeStyle = '#2b5e42';
            ctx.lineWidth = 0.6;
            for(let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            bombs.forEach(bomb => {
                const bx = bomb.x * CELL_SIZE;
                const by = bomb.y * CELL_SIZE;
                const timeLeft = Math.max(0, 5 - (Date.now() - bomb.spawnTime) / 1000);
                
                ctx.save();
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ff0000';
                
                ctx.fillStyle = '#2c2c2c';
                ctx.beginPath();
                ctx.arc(bx + CELL_SIZE/2 + Math.sin(Date.now() * 0.01) * 2, by + CELL_SIZE/2 + Math.cos(Date.now() * 0.008) * 2, CELL_SIZE/2 - 3, 0, Math.PI*2);
                ctx.fill();
                
                ctx.fillStyle = '#ff4444';
                ctx.font = `bold ${CELL_SIZE * 0.6}px monospace`;
                ctx.textAlign = "center";
                ctx.fillText("💣", bx + CELL_SIZE/2, by + CELL_SIZE/2 + 5);
                ctx.fillStyle = timeLeft <= 2 ? '#ff0000' : '#ffffff';
                ctx.font = `bold ${CELL_SIZE * 0.35}px monospace`;
                ctx.fillText(Math.ceil(timeLeft), bx + CELL_SIZE/2, by + CELL_SIZE/2 - 8);
                ctx.restore();
            });
            
            if(enemyActive && enemySnake && !isEasyMode) {
                const ex = enemySnake.x * CELL_SIZE;
                const ey = enemySnake.y * CELL_SIZE;
                ctx.fillStyle = '#8b4513';
                ctx.beginPath();
                ctx.rect(ex + 2, ey + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                ctx.fill();
                ctx.fillStyle = '#ffaa66';
                ctx.font = `bold ${CELL_SIZE * 0.65}px monospace`;
                ctx.fillText("🐍", ex + CELL_SIZE/2, ey + CELL_SIZE/2 + 5);
                // Thêm hiệu ứng chậm
                ctx.fillStyle = '#ffff00';
                ctx.font = `${CELL_SIZE * 0.25}px monospace`;
                ctx.fillText("🐢", ex + CELL_SIZE - 8, ey + 6);
            }
            
            ctx.fillStyle = '#ff5e5e';
            ctx.beginPath();
            const fx = food.x * CELL_SIZE;
            const fy = food.y * CELL_SIZE;
            ctx.arc(fx + CELL_SIZE/2, fy + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ffeeaa';
            ctx.font = `${CELL_SIZE * 0.6}px monospace`;
            ctx.fillText("🍎", fx + CELL_SIZE/2 - 17, fy + CELL_SIZE/2 + 6);
            
            for(let i=0; i<snake.length; i++) {
                const seg = snake[i];
                const segX = seg.x * CELL_SIZE;
                const segY = seg.y * CELL_SIZE;
                const isHead = (i === 0);
                
                const grad = ctx.createLinearGradient(segX, segY, segX+CELL_SIZE, segY+CELL_SIZE);
                if(isHead) {
                    grad.addColorStop(0, '#6fbf4c');
                    grad.addColorStop(1, '#3e9f2c');
                } else {
                    grad.addColorStop(0, '#489e38');
                    grad.addColorStop(1, '#2a7a1f');
                }
                ctx.fillStyle = grad;
                ctx.fillRect(segX+1, segY+1, CELL_SIZE-2, CELL_SIZE-2);
                
                if(isHead) {
                    ctx.fillStyle = 'white';
                    const eyeOff = CELL_SIZE * 0.25;
                    const eyeSize = CELL_SIZE * 0.12;
                    if(direction === 'right') {
                        ctx.fillRect(segX+CELL_SIZE-eyeOff-2, segY+eyeOff, eyeSize, eyeSize);
                        ctx.fillRect(segX+CELL_SIZE-eyeOff-2, segY+CELL_SIZE-eyeOff-eyeSize, eyeSize, eyeSize);
                        ctx.fillStyle = '#010101';
                        ctx.fillRect(segX+CELL_SIZE-eyeOff-1, segY+eyeOff+1, eyeSize-2, eyeSize-2);
                        ctx.fillRect(segX+CELL_SIZE-eyeOff-1, segY+CELL_SIZE-eyeOff-eyeSize+1, eyeSize-2, eyeSize-2);
                    } else if(direction === 'left') {
                        ctx.fillRect(segX+eyeOff, segY+eyeOff, eyeSize, eyeSize);
                        ctx.fillRect(segX+eyeOff, segY+CELL_SIZE-eyeOff-eyeSize, eyeSize, eyeSize);
                        ctx.fillStyle = '#010101';
                        ctx.fillRect(segX+eyeOff+1, segY+eyeOff+1, eyeSize-2, eyeSize-2);
                        ctx.fillRect(segX+eyeOff+1, segY+CELL_SIZE-eyeOff-eyeSize+1, eyeSize-2, eyeSize-2);
                    } else if(direction === 'up') {
                        ctx.fillRect(segX+eyeOff, segY+eyeOff, eyeSize, eyeSize);
                        ctx.fillRect(segX+CELL_SIZE-eyeOff-eyeSize, segY+eyeOff, eyeSize, eyeSize);
                        ctx.fillStyle = '#010101';
                        ctx.fillRect(segX+eyeOff+1, segY+eyeOff+1, eyeSize-2, eyeSize-2);
                        ctx.fillRect(segX+CELL_SIZE-eyeOff-eyeSize+1, segY+eyeOff+1, eyeSize-2, eyeSize-2);
                    } else {
                        ctx.fillRect(segX+eyeOff, segY+CELL_SIZE-eyeOff-eyeSize, eyeSize, eyeSize);
                        ctx.fillRect(segX+CELL_SIZE-eyeOff-eyeSize, segY+CELL_SIZE-eyeOff-eyeSize, eyeSize, eyeSize);
                        ctx.fillStyle = '#010101';
                        ctx.fillRect(segX+eyeOff+1, segY+CELL_SIZE-eyeOff-eyeSize+1, eyeSize-2, eyeSize-2);
                        ctx.fillRect(segX+CELL_SIZE-eyeOff-eyeSize+1, segY+CELL_SIZE-eyeOff-eyeSize+1, eyeSize-2, eyeSize-2);
                    }
                } else {
                    ctx.fillStyle = '#6aa858';
                    ctx.beginPath();
                    ctx.arc(segX+CELL_SIZE*0.5, segY+CELL_SIZE*0.5, 2, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            
            drawExplosions();
            
            if(!isGameRunning) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = `bold ${Math.floor(CELL_SIZE * 1.5)}px monospace`;
                ctx.fillStyle = '#ffcf9a';
                ctx.textAlign = "center";
                ctx.fillText("☠️ GAME OVER ☠️", canvas.width/2, canvas.height/2);
            } else if(snake.length === GRID_SIZE * GRID_SIZE) {
                ctx.fillStyle = 'rgba(255,215,0,0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = `bold ${CELL_SIZE}px monospace`;
                ctx.fillStyle = '#ffd966';
                ctx.fillText("VICTORY!", canvas.width/2, canvas.height/2);
            }
            ctx.textAlign = "left";
        }
        
        function changeDirection(newDir) {
            if(!isGameRunning) return;
            if((direction === 'right' && newDir === 'left') ||
               (direction === 'left' && newDir === 'right') ||
               (direction === 'up' && newDir === 'down') ||
               (direction === 'down' && newDir === 'up')) {
                return;
            }
            nextDirection = newDir;
        }
        
        function handleKey(e) {
            const key = e.key;
            if (key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight' ||
                key === 'w' || key === 'W' || key === 's' || key === 'S' || key === 'a' || key === 'A' || key === 'd' || key === 'D') {
                e.preventDefault();
            }
            switch(key) {
                case 'ArrowUp': case 'w': case 'W': changeDirection('up'); break;
                case 'ArrowDown': case 's': case 'S': changeDirection('down'); break;
                case 'ArrowLeft': case 'a': case 'A': changeDirection('left'); break;
                case 'ArrowRight': case 'd': case 'D': changeDirection('right'); break;
            }
        }
        
        function setupMobileControls() {
            document.querySelectorAll('.arrow-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const dir = btn.getAttribute('data-dir');
                    if(dir === 'up') changeDirection('up');
                    else if(dir === 'down') changeDirection('down');
                    else if(dir === 'left') changeDirection('left');
                    else if(dir === 'right') changeDirection('right');
                    canvas.focus();
                });
            });
        }
        
        function setEasyMode() {
            if(isEasyMode) return;
            isEasyMode = true;
            enemyActive = false;
            enemySnake = null;
            if(enemyMoveIntervalId) clearInterval(enemyMoveIntervalId);
            loadBestScore();
            resetGame();
        }
        
        function setHardMode() {
            if(!isEasyMode) return;
            isEasyMode = false;
            loadBestScore();
            resetGame();
        }
        
        function updateModeUI() {
            if(isEasyMode) {
                currentModeLabel.innerHTML = " Dễ 🍃";
                easyModeBtn.classList.add('mode-active');
                hardModeBtn.classList.remove('mode-active');
                enemyTimerBox.style.display = "none";
                setStatus("🐍 CHẾ ĐỘ DỄ: HỌC SINH CÒN CHƠI ĐƯỢC");
            } else {
                currentModeLabel.innerHTML = "KHÓ🔥";
                hardModeBtn.classList.add('mode-active');
                easyModeBtn.classList.remove('mode-active');
                enemyTimerBox.style.display = "flex";
                setStatus("🔥 CHẾ ĐỘ NGƯỜI CHÂU Á VỪA KHÓ VỪA ĐAU");
            }
        }
        
        window.addEventListener('load', () => {
            loadBestScore();
            resetGame();
            setupMobileControls();
            window.addEventListener('keydown', handleKey);
            document.getElementById('restartButton').addEventListener('click', () => resetGame());
            easyModeBtn.addEventListener('click', setEasyMode);
            hardModeBtn.addEventListener('click', setHardMode);
            canvas.setAttribute('tabindex', '0');
            canvas.style.outline = 'none';
            canvas.addEventListener('click', () => canvas.focus());
        });
        
        window.addEventListener('beforeunload', () => {
            if(gameLoopId) clearInterval(gameLoopId);
            if(bombTimerId) clearInterval(bombTimerId);
            if(enemyTimerId) clearInterval(enemyTimerId);
            if(enemyMoveIntervalId) clearInterval(enemyMoveIntervalId);
        });
    })();
</script>
</body>
</html>
